<svg width="800" height="240" viewBox="0 0 800 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="agentbox — edge-AI appliance">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="800" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d12"/>
      <stop offset="1" stop-color="#15101f"/>
    </linearGradient>
    <linearGradient id="accD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="wireD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glowD" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="240" rx="20" fill="url(#bgD)"/>
  <rect x="0.5" y="0.5" width="799" height="239" rx="19.5" fill="none" stroke="#2a2440" stroke-width="1"/>

  <!-- subtle grid -->
  <g stroke="#1c2230" stroke-width="1" opacity="0.6">
    <path d="M0 60 H800 M0 120 H800 M0 180 H800"/>
    <path d="M160 0 V240 M320 0 V240 M480 0 V240 M640 0 V240"/>
  </g>

  <!-- isometric box mark -->
  <g transform="translate(92 120)" filter="url(#glowD)">
    <!-- top face -->
    <path d="M0 -42 L46 -16 L0 10 L-46 -16 Z" fill="url(#accD)" opacity="0.95"/>
    <!-- left face -->
    <path d="M-46 -16 L0 10 L0 58 L-46 32 Z" fill="#5b21b6"/>
    <!-- right face -->
    <path d="M46 -16 L0 10 L0 58 L46 32 Z" fill="#6d28d9"/>
    <!-- agent node + connections -->
    <circle cx="0" cy="-12" r="6" fill="#e9d5ff"/>
    <g stroke="url(#wireD)" stroke-width="2.5" fill="none" opacity="0.9">
      <path d="M0 -12 L-30 -4"/>
      <path d="M0 -12 L30 -4"/>
      <path d="M0 -12 L0 28"/>
    </g>
    <circle cx="-30" cy="-4" r="3.5" fill="#22d3ee"/>
    <circle cx="30" cy="-4" r="3.5" fill="#22d3ee"/>
    <circle cx="0" cy="28" r="3.5" fill="#22d3ee"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(196 0)" font-family="'Segoe UI', Inter, system-ui, -apple-system, sans-serif">
    <text x="0" y="112" font-size="58" font-weight="800" letter-spacing="-1.5">
      <tspan fill="#f4f4f5">agent</tspan><tspan fill="url(#accD)">box</tspan>
    </text>
    <text x="2" y="148" font-size="19" font-weight="500" fill="#a1a1aa" letter-spacing="0.2">
      Edge-AI appliance · agent · memory · desktop
    </text>
    <g transform="translate(2 168)">
      <rect x="0" y="0" width="150" height="26" rx="13" fill="#1e1b2e" stroke="#3b3358"/>
      <text x="75" y="17.5" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.4">thUMBox family</text>
      <rect x="160" y="0" width="120" height="26" rx="13" fill="#0e2230" stroke="#164e63"/>
      <text x="220" y="17.5" font-size="12" font-weight="600" fill="#67e8f9" text-anchor="middle" letter-spacing="0.4">self-hosted</text>
    </g>
  </g>
</svg>
