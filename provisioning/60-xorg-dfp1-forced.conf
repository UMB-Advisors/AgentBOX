# hermesBOX — /etc/X11/xorg.conf for the Jetson Orin Nano kiosk display (DP-1).
# WHY: the DisplayPort link HPD flaps (connected→disconnected repeatedly — marginal
# cable/adapter). The NVIDIA driver detected the monitor (Philips 27E2N2100) but kept
# dropping it, so the kiosk screen went black. This config forces the output ON and
# tells the driver to IGNORE hotplug events, so X keeps driving DP-1 through the flaps.
# Deploy: sudo cp this -> /etc/X11/xorg.conf (backup: xorg.conf.prehermesbox), then
# restart the kiosk. cog/WPE does NOT render on this Tegra stack (FDO backend produces
# no visible output) — Phase 6 committed the chromium fallback instead.
# Spec: PRD §8 Phase 6 / DR-005 · Linear UMB-385.
#
# KNOWN LIMITATION: without a stable EDID the driver uses "nvidia-auto-select" (not
# guaranteed 1920x1080). A custom 1080p Modeline was REJECTED ("No valid modes")
# without EDID. To get native res reliably: fix the cable so EDID is stable, OR
# capture the monitor EDID and add Option "CustomEDID" "DFP-1:/path/edid.bin".
Section "Module"
    Disable     "dri"
    SubSection  "extmod"
        Option  "omit xfree86-dga"
    EndSubSection
EndSection
Section "Device"
    Identifier  "Tegra0"
    Driver      "nvidia"
    Option      "AllowEmptyInitialConfiguration" "true"
    Option      "ConnectedMonitor" "DFP-1"     # force the output present
    Option      "UseHotplugEvents" "false"     # ignore the flapping HPD line
    Option      "ModeValidation" "AllowNonEdidModes, NoMaxPClkCheck, NoEdidMaxPClkCheck"
EndSection
