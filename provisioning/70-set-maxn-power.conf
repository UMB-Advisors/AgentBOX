# hermesBOX — Phase 7 drop-in: fix set-maxn-power.service (status=203/EXEC).
# Root cause: the stock unit hard-codes ExecStart=/usr/bin/nvpmodel, but on this
# JetPack 6.2 image nvpmodel lives at /usr/sbin/nvpmodel — so the unit fails at
# the EXEC step (203) even though the board is ALREADY in MAXN_SUPER (mode 2).
# A failed oneshot keeps `systemctl is-system-running` = degraded.
#
# Fix strategy (drop-in, non-destructive — never edit the vendor unit in place):
#   1. Blank then re-set ExecStart to the correct absolute path (`-` prefix so a
#      transient nvpmodel hiccup can't re-degrade the system).
#   2. Add a guard ExecStartPre that no-ops if already at mode 2 (idempotent).
#   3. SuccessExitStatus tolerates nvpmodel's "already in this mode" return.
# Installed to: /etc/systemd/system/set-maxn-power.service.d/hermesbox.conf
[Service]
ExecStart=
ExecStart=-/usr/sbin/nvpmodel -m 2
SuccessExitStatus=0 1
