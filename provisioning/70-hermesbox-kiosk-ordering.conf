# hermesBOX — Phase 7 drop-in: boot ordering for the kiosk session.
# The base kiosk unit is authored by Phase 6 (expected name: hermesbox-kiosk.service,
# launching cog/WPE -> http://127.0.0.1:9200 (agentbox-sidecar), chromium --kiosk fallback). This drop-in
# only sequences it; it does not define the unit. If Phase 6 has not landed yet,
# 70-hardening.sh skips installing this drop-in (systemd would warn on an orphan
# drop-in dir for a non-existent unit).
#
# Ordering: the kiosk renders the agent's web dashboard, so it must come up AFTER
# the dashboard is serving :9119, which in turn needs the agent. We order on
# hermesbox-dashboard.service (Phase 6) and hermes-gateway.service. We do NOT
# Requires= the dashboard: a dashboard hiccup should restart the kiosk (Phase 6's
# Restart=on-failure), not block the whole boot.
# Installed to: /etc/systemd/system/hermesbox-kiosk.service.d/hermesbox-ordering.conf
[Unit]
After=hermesbox-dashboard.service hermes-gateway.service
Wants=hermesbox-dashboard.service
