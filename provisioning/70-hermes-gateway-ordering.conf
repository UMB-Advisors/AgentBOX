# hermesBOX — Phase 7 drop-in: boot ordering for the hermes gateway service.
# The base unit (hermes-gateway.service) is generated by `hermes gateway install
# --system` and already declares After/Wants=network-online.target. We must NOT
# edit that generated unit; we layer ordering here so a `hermes gateway` reinstall
# does not clobber our boot contract.
#
# hermes-gateway is the agent + WhatsApp bridge host (WhatsApp is a gateway
# platform adapter, not a separate service) and it spawns gbrain over MCP stdio
# (no separate unit). It depends on:
#   - network-online.target : cloud inference (OpenAI Codex) requires the network.
#   - ollama.service         : gbrain memory embeddings (nomic-embed-text on :11434).
# ollama is After-only (not Requires): the agent must still boot for local chat/
# memory-reads even if ollama is briefly down — embeddings degrade, agent does not.
# Installed to: /etc/systemd/system/hermes-gateway.service.d/hermesbox-ordering.conf
[Unit]
After=ollama.service tailscaled.service
Wants=ollama.service
