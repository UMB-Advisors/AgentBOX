name: Guard stale hermes-agent-main tree

# hermes-agent-main/ is a STALE DUPLICATE (2026-06-12) — UI source of truth is
# agentbox-sidecar/web; the hermes_cli overlay pattern is dead. Fail any PR that
# touches the frozen tree so changes don't land somewhere that deploys nowhere.
# See hermes-agent-main/DEPRECATED.md.

on:
  pull_request:
    paths:
      - 'hermes-agent-main/**'
      # the deprecation banners themselves are allowed to change
      - '!hermes-agent-main/DEPRECATED.md'
      - '!hermes-agent-main/hermes-agent-main/web/README.md'

jobs:
  block:
    runs-on: ubuntu-latest
    steps:
      - name: Fail — frozen tree touched
        run: |
          echo "::error::hermes-agent-main/ is a frozen stale duplicate (see hermes-agent-main/DEPRECATED.md)."
          echo "::error::Build UI/features in UMB-Advisors/agentbox-sidecar instead."
          exit 1
